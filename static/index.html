  // Show a clear message instead of a silent blank page if a CDN file
  // fails to load (blocked network, offline, ad-blocker, etc.)
  function showFatalOverlay(msg) {
    var root = document.getElementById('root');
    if (!root) return;
    root.innerHTML = '<div style="padding:40px;font-family:sans-serif;max-width:700px;margin:0 auto">' +
      '<h2 style="color:#b91c1c">Something went wrong</h2>' +
      '<pre style="white-space:pre-wrap;font-family:monospace;background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:12px;color:#b91c1c">' + msg + '</pre>' +
      '<button onclick="location.reload()" style="margin-top:12px;background:#0f766e;color:#fff;border:0;padding:10px 16px;border-radius:8px;cursor:pointer">Reload page</button></div>';
  }
  window.addEventListener('error', function (e) {
    var isResource = e.target && e.target.tagName === 'SCRIPT';
    if (isResource) {
      showFatalOverlay('Failed to load: ' + (e.target.src || 'a required file') +
        '\n\nThis page needs internet access to load React/Chart.js from a CDN. ' +
        'Check your internet connection, disable any ad-blocker/VPN restriction for this page, then refresh (Ctrl+F5).');
    } else {
      var msg = 'JavaScript error: ' + e.message + '\n' + (e.error && e.error.stack || '');
      console.error(msg);
      // If the error happened before React ever mounted (e.g. a syntax/parse error
      // in the Babel-transpiled script), the root is still empty — show it there
      // instead of leaving a silent white page. Once mounted, React's own
      // ErrorBoundary (below) handles rendering errors, so we only overlay here
      // for pre-mount failures.
      if (window.__appMounted !== true) { showFatalOverlay(msg); }
    }
  }, true);
  window.addEventListener('unhandledrejection', function (e) {
    var msg = 'Unhandled promise rejection: ' + (e.reason && (e.reason.stack || e.reason.message || e.reason));
    console.error(msg);
    if (window.__appMounted !== true) { showFatalOverlay(msg); }
  });
</script>

/* ============== API BASE ============== */
const API = window.location.origin + "/api";

// Every API call goes through this wrapper: if the server doesn't respond
// within 8 seconds, the request is aborted and rejected instead of hanging
// the UI forever. Pages catch this and fall back to an empty/error state.
function apiFetch(url, options) {
  const controller = new AbortController();
  // 30s instead of 8s: free hosting (e.g. Render) can take ~30s to wake from sleep,
  // and 8s made the very first signup/login abort with a false "backend offline".
  const timer = setTimeout(() => controller.abort(), 30000);
  const opts = Object.assign({}, options, { signal: controller.signal });
  // Attach the auth token (set on admin/user login) so admin-only endpoints work.
  if (window.__authToken) {
    opts.headers = Object.assign({}, opts.headers, { Authorization: "Bearer " + window.__authToken });
  }
  return fetch(url, opts).finally(() => clearTimeout(timer));
}

// Helper for reads that should show a loading/error state (Reports, Users list).
// Unlike apiFetch on its own, this rejects on a non-OK response so a 404/500 HTML
// error page from Flask doesn't silently break r.json() and leave the page stuck
// on a blank/empty screen forever. (Login/signup/add-user intentionally keep using
// apiFetch directly, since they need to read the JSON body even on error responses.)
function apiFetchJson(url) {
  return apiFetch(url).then((res) => {
    if (!res.ok) {
      const err = new Error("Request failed: " + res.status + " " + res.url);
      err.status = res.status;
      throw err;
    }
    return res.json();
  });
}

/* ============== SESSION PERSISTENCE ============== */
// Logged-in sessions (admin / registered users) are saved in the browser.
// v15 "remember me": checked -> localStorage (survives closing the browser,
// up to 30 days server-side); unchecked -> sessionStorage (cleared when the
// tab/browser closes, matching the server's shorter 12h token). Guests are
// never saved.
const AUTH_KEY = "hus_auth";
const AUTH_MAX_AGE_MS = 12 * 60 * 60 * 1000;          // 12h — non-remembered sessions
const AUTH_MAX_AGE_MS_REMEMBER = 30 * 24 * 60 * 60 * 1000; // 30 days — "remember me"

function saveSession(user, token, remember = true) {
  try {
    if (!token || !user || user.guest) return; // only real accounts are remembered
    const payload = JSON.stringify({ user, token, ts: Date.now(), remember: !!remember });
    if (remember) { localStorage.setItem(AUTH_KEY, payload); sessionStorage.removeItem(AUTH_KEY); }
    else { sessionStorage.setItem(AUTH_KEY, payload); localStorage.removeItem(AUTH_KEY); }
  } catch (e) { /* private mode / storage disabled — just skip remembering */ }
}
function loadSession() {
  try {
    const raw = localStorage.getItem(AUTH_KEY) || sessionStorage.getItem(AUTH_KEY);
    if (!raw) return null;
    const s = JSON.parse(raw);
    const maxAge = s && s.remember === false ? AUTH_MAX_AGE_MS : AUTH_MAX_AGE_MS_REMEMBER;
    if (!s || !s.token || !s.user || Date.now() - (s.ts || 0) > maxAge) {
      localStorage.removeItem(AUTH_KEY); sessionStorage.removeItem(AUTH_KEY);
      return null;
    }
    return s;
  } catch (e) { return null; }
}
function clearSession() {
  try { localStorage.removeItem(AUTH_KEY); sessionStorage.removeItem(AUTH_KEY); } catch (e) {}
}
// Whichever storage currently holds the session tells us whether "remember
// me" was on — used to keep that choice when re-saving after a preference
// update (e.g. changing site/comments/assistant language), instead of
// silently upgrading a session-only login to a remembered one.
function currentRemember() {
  try {
    if (sessionStorage.getItem(AUTH_KEY)) return false;
    if (localStorage.getItem(AUTH_KEY)) return true;
  } catch (e) {}
  return true;
}

/* ============== COMMENT TRANSLATION (Settings -> Comments Language) ============== */
// EVERY signed-in account (admin AND regular users) can pick a display
// language for comments in Settings — the choice is personal per account,
// saved on the account's row in the database and restored on every login:
//   "original" (default) -> comments are shown exactly as written
//   "ar" / "en"          -> every displayed comment is auto-translated
// Translation runs in the browser through Google's free translate endpoint,
// results are cached in memory, and on any failure the ORIGINAL text is shown
// — so nothing in the database is ever modified and nothing can break.
const COMMENTS_LANG_KEY = "hus_comments_lang";
const SITE_LANG_KEY = "hus_site_lang";           // v15
const ASSISTANT_LANG_KEY = "hus_assistant_lang"; // v15
const _trCache = {};
const hasArabic = (s) => /[\u0600-\u06FF]/.test(s || "");
function needsTranslation(text, target) {
  if (!text) return false;
  if (target === "ar") return !hasArabic(text); // already Arabic -> keep as-is
  if (target === "en") return hasArabic(text);  // already English/Latin -> keep
  if (target && target !== "original") return true; // v15: tr/ur/hi/he — always attempt (no cheap script check)
  return false;
}
function translateText(text, target) {
  const key = target + "||" + text;
  if (_trCache[key]) return Promise.resolve(_trCache[key]);
  const url = "https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=" +
    target + "&dt=t&q=" + encodeURIComponent(text);
  return fetch(url)
    .then((r) => { if (!r.ok) throw new Error("translate failed"); return r.json(); })
    .then((data) => {
      const out = ((data && data[0]) || []).map((p) => (p && p[0]) || "").join("").trim();
      if (!out) throw new Error("empty translation");
      _trCache[key] = out;
      return out;
    });
}
// Returns { map: {commentId -> translatedText}, busy } for a list of comments.
function useTranslatedTexts(items, target) {
  const [map, setMap] = useState({});
  const [busy, setBusy] = useState(false);
  const depKey = JSON.stringify([target, (items || []).map((c) => [c.id, c.text, c.text_ar || null])]);
  useEffect(() => {
    if (!target || target === "original" || !items || !items.length) { setMap({}); setBusy(false); return; }
    // v13: the server already detected each comment's language and stored an
    // Arabic translation (text_ar) at ingest time — use it INSTANTLY, no
    // network needed. The browser-side translator remains as a fallback for
    // English display and for comments not yet processed by the server.
    const ready = {};
    (items || []).forEach((c) => { if (target === "ar" && c.text_ar) ready[c.id] = c.text_ar; });
    const todo = items.filter((c) => !ready[c.id] && needsTranslation(c.text, target));
    if (!todo.length) { setMap(ready); setBusy(false); return; }
    let alive = true;
    setBusy(true);
    setMap(ready); // show the instant ones immediately while the rest translate
    Promise.all(todo.map((c) =>
      translateText(c.text, target).then((tr) => [c.id, tr]).catch(() => [c.id, c.text])
    )).then((pairs) => {
      if (!alive) return;
      const m = Object.assign({}, ready);
      pairs.forEach(([id, tr]) => { m[id] = tr; });
      setMap(m);
      setBusy(false);
    });
    return () => { alive = false; };
  }, [depKey]);
  return { map, busy };
}

/* ============== CHART.JS WRAPPER ============== */
function ChartCanvas({ type, data, options, height = 220 }) {
  const ref = useRef(null);
  const chartRef = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    chartRef.current = new Chart(ref.current.getContext("2d"), { type, data, options });
    return () => {
      // Destroy exactly once, then clear the ref — without this, the next
      // effect run saw a stale (already-destroyed) chart instance and called
      // destroy() on it a second time, which throws inside Chart.js.
      if (chartRef.current) {
        chartRef.current.destroy();
        chartRef.current = null;
      }
    };
  }, [type, JSON.stringify(data), JSON.stringify(options)]);
  return <div style={{ height }}><canvas ref={ref}></canvas></div>;
}

/* ============== LOGIN ============== */
function Login({ t, lang, setLang, dark, setDark, onLogin }) {
  const [mode, setMode] = useState("login"); // login | signup | forgot
  const [name, setName] = useState("");
  const [email, setEmail] = useState("");
  const [pw, setPw] = useState("");
  const [remember, setRemember] = useState(true); // v15: "remember me"
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [info, setInfo] = useState("");
  // v15.5: email OTP sign-in
  const [otpStep, setOtpStep] = useState("email"); // email | code
  const [otpCode, setOtpCode] = useState("");
  const [otpEnabled, setOtpEnabled] = useState(false);

  const reset = () => { setError(""); setInfo(""); };

  const submitLogin = async (e) => {
    e.preventDefault(); reset(); setLoading(true);
    try {
      const r = await apiFetch(`${API}/auth/login`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ email, password: pw, remember }) });
      const data = await r.json();
      if (!r.ok) { setError((lang === "ar" && data.error_ar) || data.error || t.loginFailed); setLoading(false); return; }
      window.__authToken = data.token || null;
      saveSession(data.user, data.token, remember); // v15: localStorage (remembered) or sessionStorage (this tab only)
      onLogin(data.user || data);
    } catch { setError(t.backendOffline); }
    setLoading(false);
  };

  const submitSignup = async (e) => {
    e.preventDefault(); reset(); setLoading(true);
    try {
      const r = await apiFetch(`${API}/auth/signup`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ name, email, password: pw, remember }) });
      const data = await r.json();
      if (!r.ok) { setError((lang === "ar" && data.error_ar) || data.error || t.loginFailed); setLoading(false); return; }
      window.__authToken = data.token || null;
      saveSession(data.user, data.token, remember); // remember the new account for next visits
      onLogin(data.user || data);
    } catch { setError(t.backendOffline); }
    setLoading(false);
  };

  const continueAsGuest = async () => {
    reset(); setLoading(true);
    window.__authToken = null;
    try {
      const r = await apiFetch(`${API}/auth/guest`, { method: "POST", headers: { "Content-Type": "application/json" }, body: "{}" });
      const data = await r.json();
      onLogin((data && data.user) || { name: "Guest", role: "guest", guest: true });
    } catch {
      // Even if the backend is unreachable, let the guest into the read-only UI.
      onLogin({ name: "Guest", role: "guest", guest: true });
    }
    setLoading(false);
  };

  const submitForgot = async (e) => {
    e.preventDefault(); reset(); setLoading(true);
    try {
      const r = await apiFetch(`${API}/auth/forgot-password`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ email }) });
      const data = await r.json();
      setInfo(data.message);
    } catch { setError(t.backendOffline); }
    setLoading(false);
  };

  // v15.5: request a verification code to the email the person typed.
  const requestOtp = async (e) => {
    e.preventDefault(); reset(); setLoading(true);
    try {
      const r = await apiFetch(`${API}/auth/request-otp`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ email, name }) });
      const data = await r.json();
      if (!r.ok) { setError((lang === "ar" && data.error_ar) || data.error || t.loginFailed); setLoading(false); return; }
      setOtpStep("code");
      setInfo(`${t.codeSentTo} ${email}`);
    } catch { setError(t.backendOffline); }
    setLoading(false);
  };

  // v15.5: verify the code — creates/opens the account only if it's correct.
  const verifyOtp = async (e) => {
    e.preventDefault(); reset(); setLoading(true);
    try {
      const r = await apiFetch(`${API}/auth/verify-otp`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ email, code: otpCode, name, remember }) });
      const data = await r.json();
      if (!r.ok) { setError((lang === "ar" && data.error_ar) || data.error || t.loginFailed); setLoading(false); return; }
      window.__authToken = data.token || null;
      saveSession(data.user, data.token, remember);
      onLogin(data.user || data);
    } catch { setError(t.backendOffline); }
    setLoading(false);
  };

  // v15: Google / Apple are prepared but not yet connected (no OAuth client
  // credentials configured) — clicking shows a friendly "coming soon" note
  // instead of pretending to sign the person in. Apple still uses this;
  // Google is wired up for real below once GOOGLE_OAUTH_CLIENT_ID is set.
  const [oauthNote, setOauthNote] = useState("");
  const tryOauth = (provider) => {
    setOauthNote(`${provider === "google" ? t.continueWithGoogle : t.continueWithApple} — ${t.comingSoon}`);
    setTimeout(() => setOauthNote(""), 3000);
  };

  // v15.4: real Google Sign-In. googleClientId stays null (falling back to
  // the "coming soon" button above) until the backend confirms
  // GOOGLE_OAUTH_CLIENT_ID is actually configured — an OAuth client id is
  // not a secret (Google's own integration guides embed it directly in
  // frontend JS), so this is safe to expose as-is.
  const [googleClientId, setGoogleClientId] = useState(null);
  const googleBtnRef = useRef(null);
  // handleGoogleCredential is handed to Google's library once and called
  // MUCH later, whenever the button is actually clicked — so it can't just
  // close over `remember` (that closure would go stale the moment the
  // checkbox changes after the button first renders). A ref always reads
  // the current value at click time instead.
  const rememberRef = useRef(remember);
  useEffect(() => { rememberRef.current = remember; }, [remember]);

  useEffect(() => {
    apiFetch(`${API}/auth/google-config`).then((r) => (r.ok ? r.json() : null))
      .then((d) => { if (d && d.enabled && d.client_id) setGoogleClientId(d.client_id); })
      .catch(() => {}); // offline or not configured -> silently keep the "coming soon" button
    // v15.5: is email-code sign-in available (SMTP configured server-side)?
    apiFetch(`${API}/auth/otp-config`).then((r) => (r.ok ? r.json() : null))
      .then((d) => { if (d && d.enabled) setOtpEnabled(true); })
      .catch(() => {});
  }, []);

  const handleGoogleCredential = async (response) => {
    reset(); setLoading(true);
    try {
      const r = await apiFetch(`${API}/auth/google`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id_token: response.credential, remember: rememberRef.current }),
      });
      const data = await r.json();
      if (!r.ok) { setError((lang === "ar" && data.error_ar) || data.error || t.loginFailed); setLoading(false); return; }
      window.__authToken = data.token || null;
      saveSession(data.user, data.token, rememberRef.current);
      onLogin(data.user || data);
    } catch { setError(t.backendOffline); }
    setLoading(false);
  };

  // Renders Google's own branded button into googleBtnRef once both the
  // client id (from the backend, above) AND Google's script (loaded via a
  // plain <script async defer> tag, so timing isn't guaranteed) are ready —
  // a short poll covers the gap instead of assuming load order.
  useEffect(() => {
    if (!googleClientId || !googleBtnRef.current) return;
    let cancelled = false;
    const tryInit = () => {
      if (cancelled || !googleBtnRef.current) return;
      if (window.google && window.google.accounts && window.google.accounts.id) {
        window.google.accounts.id.initialize({ client_id: googleClientId, callback: handleGoogleCredential });
        window.google.accounts.id.renderButton(googleBtnRef.current, {
          theme: dark ? "filled_black" : "outline",
          size: "large",
          text: "signin_with",
          locale: lang,
          // matches whatever width the grid cell actually gives it (mobile
          // vs desktop) instead of a fixed guess that could overflow
          width: Math.max(120, Math.min(400, Math.floor(googleBtnRef.current.offsetWidth) || 200)),
        });
      } else {
        setTimeout(tryInit, 150);
      }
    };
    tryInit();
    return () => { cancelled = true; };
  }, [googleClientId, dark, lang]);

  return (
    <div className={`min-h-screen flex items-center justify-center p-4 ${dark ? "bg-slate-950" : "bg-emerald-50"}`}>
      <div className="absolute top-4 inset-x-4 flex justify-end gap-2 z-10">
        <select value={lang} onChange={(e) => setLang(e.target.value)}
          className={`px-3 py-2 rounded-full text-sm font-medium shadow border-0 cursor-pointer ${dark ? "bg-slate-800 text-gray-200" : "bg-white text-emerald-900"}`}>
          {UI_LANGS.map((code) => <option key={code} value={code}>{LANG_NAMES[code]}</option>)}
        </select>
        <button onClick={() => setDark(!dark)} className={`w-9 h-9 flex items-center justify-center rounded-full shadow ${dark ? "bg-slate-800 text-amber-300" : "bg-white text-emerald-900"}`}>
          <Icon name={dark ? "sun" : "moon"} size={16} />
        </button>
      </div>
      <div className={`w-full max-w-4xl grid md:grid-cols-2 rounded-3xl overflow-hidden shadow-2xl ${dark ? "bg-slate-900" : "bg-white"}`}>
        <div className="relative hidden md:flex flex-col justify-end p-8 text-white min-h-[520px]"
          style={{ background: "linear-gradient(180deg, rgba(3,30,22,.55), rgba(3,20,15,.9)), url(https://images.unsplash.com/photo-1591604129939-f1efa4d9f7fa?q=80&w=1200&auto=format&fit=crop) center/cover" }}>
          <svg width="52" height="52" viewBox="0 0 24 24" fill="none" className="mb-4 text-amber-300">
            <path d="M12 2C9 6 8 8 8 11a4 4 0 008 0c0-3-1-5-4-9z" stroke="currentColor" strokeWidth="1.4" />
            <path d="M4 21v-3a8 8 0 0116 0v3" stroke="currentColor" strokeWidth="1.4" />
          </svg>
          <h1 className="text-3xl font-bold mb-2">{t.appName}</h1>
          <p className="text-white/70 text-sm mb-3">{t.appSub}</p>
          <div className="h-px w-16 bg-amber-300/70 mb-3" />
          <p className="text-white/80 text-sm leading-relaxed max-w-xs">{t.loginHeadline}</p>
        </div>

        {mode === "login" && (
          <form onSubmit={submitLogin} className="p-8 md:p-10 flex flex-col justify-center">
            <div className={`w-14 h-14 rounded-full flex items-center justify-center mx-auto mb-4 ${dark ? "bg-slate-800" : "bg-emerald-50"}`}>
              <Icon name="user" size={22} className={dark ? "text-emerald-300" : "text-emerald-700"} />
            </div>
            <h2 className={`font-bold text-center ${dark ? "text-white" : "text-gray-900"}`}>{t.welcomeBack}</h2>
            <p className={`text-sm text-center mb-5 ${dark ? "text-gray-400" : "text-gray-500"}`}>{t.signInSub}</p>
            {error && <p className="text-rose-600 text-xs text-center mb-3">{error}</p>}

            <div className="flex items-center justify-between mb-4">

            </div>
            {oauthNote && <p className={`text-center text-[11px] mb-2 ${dark ? "text-amber-300" : "text-amber-600"}`}>{oauthNote}</p>}
            {otpEnabled && (
              <button type="button" disabled={loading} onClick={() => { setMode("otp"); setOtpStep("email"); reset(); }}

            <input required value={name} onChange={(e) => setName(e.target.value)} placeholder={t.name}
              className={`${PILL} mb-3 ${dark ? "bg-slate-800 border-slate-700 text-white" : "border-gray-200"}`} />
            <input required type="email" value={email} onChange={(e) => setEmail(e.target.value)} placeholder={t.email}
              className={`${PILL} mb-3 ${dark ? "bg-slate-800 border-slate-700 text-white" : "border-gray-200"}`} />
            <input required type="password" minLength={6} value={pw} onChange={(e) => setPw(e.target.value)} placeholder={t.password}
              className={`${PILL} mb-4 ${dark ? "bg-slate-800 border-slate-700 text-white" : "border-gray-200"}`} />

              {loading ? "..." : t.createAccount}

              <button type="button" onClick={() => { setMode("login"); reset(); }} className="text-emerald-600 font-medium">{t.backToLogin}</button>

// Tiny Markdown renderer — just enough for the assistant's answer format
// (headings, **bold**, bullet/numbered lists, --- dividers, _italic_ notes)
// without pulling in a Markdown library.
function InlineMarkdown({ text }) {
  const parts = String(text || "").split(/(\*\*[^*]+\*\*)/g);
  return parts.map((p, i) => {
    if (p.startsWith("**") && p.endsWith("**") && p.length > 3) return <strong key={i}>{p.slice(2, -2)}</strong>;
    if (p.startsWith("_") && p.endsWith("_") && p.length > 2) return <em key={i} className="opacity-70">{p.slice(1, -1)}</em>;
    return <React.Fragment key={i}>{p}</React.Fragment>;
  });
}
function MarkdownLite({ text, dark }) {
  const lines = String(text || "").split("\n");
  const blocks = [];
  let listBuffer = [];
  let listType = null;
  const flushList = () => {
    if (!listBuffer.length) { listType = null; return; }
    const items = listBuffer;
    blocks.push(
      listType === "ol"
        ? <ol key={blocks.length} className="list-decimal ps-5 space-y-1 my-2">{items.map((it, i) => <li key={i}><InlineMarkdown text={it} /></li>)}</ol>
        : <ul key={blocks.length} className="list-disc ps-5 space-y-1 my-2">{items.map((it, i) => <li key={i}><InlineMarkdown text={it} /></li>)}</ul>
    );
    listBuffer = []; listType = null;
  };
  lines.forEach((line) => {
    const trimmed = line.trim();
    if (!trimmed) { flushList(); return; }
    if (trimmed === "---") { flushList(); blocks.push(<hr key={blocks.length} className={`my-3 ${dark ? "border-slate-800" : "border-gray-200"}`} />); return; }
    const bulletMatch = trimmed.match(/^[-•]\s+(.*)$/);
    const numMatch = trimmed.match(/^\d+[.)]\s+(.*)$/);
    if (bulletMatch) { if (listType !== "ul") flushList(); listType = "ul"; listBuffer.push(bulletMatch[1]); return; }
    if (numMatch) { if (listType !== "ol") flushList(); listType = "ol"; listBuffer.push(numMatch[1]); return; }
    flushList();
    if (/^\*\*[^*]+\*\*$/.test(trimmed) || trimmed.startsWith("#")) {
      blocks.push(<div key={blocks.length} className="font-bold text-[15px] mt-2 mb-1"><InlineMarkdown text={trimmed.replace(/^#+\s*/, "")} /></div>);
    } else {
      blocks.push(<p key={blocks.length} className="leading-relaxed"><InlineMarkdown text={trimmed} /></p>);
    }
  });
  flushList();
  return <div className="space-y-0.5">{blocks}</div>;
}

function AssistantPage({ t, dark, lang, assistantLang }) {
  const effectiveLang = (assistantLang && assistantLang !== "auto") ? assistantLang : lang;
  const [messages, setMessages] = useState([]); // [{role: "user"|"assistant", content, engine?, error?}]
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [copiedIdx, setCopiedIdx] = useState(null);
  const endRef = useRef(null);

  useEffect(() => { if (endRef.current) endRef.current.scrollIntoView({ behavior: "smooth", block: "end" }); }, [messages, loading]);

  const send = async (baseOverride) => {
    let base = baseOverride;
    if (!base) {
      const text = input.trim();
      if (!text || loading) return;
      base = [...messages, { role: "user", content: text }];
      setMessages(base);
      setInput("");
    }
    setLoading(true);
    try {
      const r = await apiFetch(`${API}/assistant/chat`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages: base.map(({ role, content }) => ({ role, content })), lang: effectiveLang }),
      });
      const data = await r.json();
      setMessages((m) => [...m, { role: "assistant", content: (data && data.reply) || "", engine: data && data.engine }]);
    } catch (e) {
      setMessages((m) => [...m, { role: "assistant", content: t.backendOffline, error: true }]);
    }
    setLoading(false);
  };

  const newChat = () => { setMessages([]); setInput(""); };
  const copyMsg = (text, idx) => {
    const doCopy = navigator.clipboard ? navigator.clipboard.writeText(text) : Promise.reject();
    doCopy.then(() => { setCopiedIdx(idx); setTimeout(() => setCopiedIdx(null), 1500); }).catch(() => {});
  };
  const shareMsg = (text) => {
    if (navigator.share) navigator.share({ text, title: t.assistant }).catch(() => {});
    else copyMsg(text, -1);
  };
  const regenerate = () => {
    if (loading || !messages.length) return;
    const base = messages[messages.length - 1].role === "assistant" ? messages.slice(0, -1) : messages.slice();
    setMessages(base);
    send(base);
  };
  let lastAssistantIdx = -1;
  messages.forEach((m, i) => { if (m.role === "assistant") lastAssistantIdx = i; });

  return (
    <div className="p-4 md:p-6 flex flex-col gap-3" style={{ minHeight: "calc(100vh - 64px)" }}>
      <Card dark={dark} className="p-4 flex items-center justify-between shrink-0">
        <div className="flex items-center gap-2 min-w-0">
          <Icon name="sparkles" size={18} className="text-emerald-600 shrink-0" />
          <div className="min-w-0">
            <div className={`font-semibold truncate ${dark ? "text-white" : "text-gray-900"}`}>{t.assistant}</div>
            <div className={`text-[11px] truncate ${dark ? "text-gray-500" : "text-gray-400"}`}>{t.assistantSub}</div>
          </div>
        </div>
        <button onClick={newChat} className={`shrink-0 flex items-center gap-1.5 text-xs px-3 py-2 rounded-xl border ${dark ? "border-slate-700 text-gray-200 hover:bg-slate-800" : "border-gray-200 text-gray-700 hover:bg-gray-50"}`}>
          <Icon name="plus" size={13} /> {t.newChat}
        </button>
      </Card>

      <Card dark={dark} className="flex-1 p-4 md:p-5 flex flex-col overflow-hidden">
        <div className="flex-1 overflow-y-auto space-y-4 pr-1" style={{ maxHeight: "58vh" }}>
          {!messages.length && (
            <div className={`h-full min-h-[200px] flex items-center justify-center text-center text-sm p-6 ${dark ? "text-gray-500" : "text-gray-400"}`}>
              <div>
                <Icon name="sparkles" size={26} className="mx-auto mb-2 text-emerald-500" />
                {t.assistantWelcome}
              </div>
            </div>
          )}
          {messages.map((m, i) => (
            <div key={i} className={`flex ${m.role === "user" ? "justify-end" : "justify-start"}`}>
              <div className={`max-w-[88%] md:max-w-[75%] rounded-2xl px-4 py-3 text-sm ${
                m.role === "user" ? "bg-emerald-700 text-white"
                  : m.error ? "bg-rose-50 text-rose-600" : dark ? "bg-slate-800 text-gray-100" : "bg-gray-50 text-gray-800"}`}>
                {m.role === "user" ? <p className="whitespace-pre-wrap">{m.content}</p> : <MarkdownLite text={m.content} dark={dark} />}
                {m.role === "assistant" && !m.error && (
                  <div className={`flex items-center gap-3 mt-2.5 pt-2 border-t ${dark ? "border-slate-700" : "border-gray-200"}`}>
                    <button onClick={() => copyMsg(m.content, i)} className={`text-[11px] flex items-center gap-1 ${dark ? "text-gray-400 hover:text-white" : "text-gray-500 hover:text-gray-800"}`}>
                      <Icon name="copy" size={11} /> {copiedIdx === i ? t.copied : t.copyAnswer}
                    </button>
                    <button onClick={() => shareMsg(m.content)} className={`text-[11px] flex items-center gap-1 ${dark ? "text-gray-400 hover:text-white" : "text-gray-500 hover:text-gray-800"}`}>
                      <Icon name="upload" size={11} /> {t.shareAnswer}
                    </button>
                    {i === lastAssistantIdx && (
                      <button onClick={regenerate} disabled={loading} className={`text-[11px] flex items-center gap-1 disabled:opacity-40 ${dark ? "text-gray-400 hover:text-white" : "text-gray-500 hover:text-gray-800"}`}>
                        <Icon name="refresh" size={11} /> {t.regenerate}
                      </button>
                    )}
                  </div>
                )}
              </div>
            </div>
          ))}
          {loading && (
            <div className="flex justify-start">
              <div className={`rounded-2xl px-4 py-3 flex items-center gap-2 text-xs ${dark ? "bg-slate-800 text-gray-400" : "bg-gray-50 text-gray-500"}`}>
                <span className="flex gap-1">
                  <span className="w-1.5 h-1.5 rounded-full bg-current animate-bounce" style={{ animationDelay: "0ms" }} />
                  <span className="w-1.5 h-1.5 rounded-full bg-current animate-bounce" style={{ animationDelay: "120ms" }} />
                  <span className="w-1.5 h-1.5 rounded-full bg-current animate-bounce" style={{ animationDelay: "240ms" }} />
                </span>
                {t.assistantTyping}
              </div>
            </div>
          )}
          <div ref={endRef} />
        </div>

        <div className={`mt-4 pt-3 border-t flex items-end gap-2 shrink-0 ${dark ? "border-slate-800" : "border-gray-100"}`}>
          <textarea value={input} onChange={(e) => setInput(e.target.value)}
            onKeyDown={(e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } }}
            rows={1} placeholder={t.assistantPlaceholder}
            className={`flex-1 resize-none rounded-xl border p-3 text-sm max-h-32 focus:outline-none focus:ring-2 focus:ring-emerald-500 ${dark ? "bg-slate-800 border-slate-700 text-white" : "border-gray-200"}`} />
          <button onClick={() => send()} disabled={loading || !input.trim()}
            className="shrink-0 flex items-center gap-1.5 bg-emerald-700 hover:bg-emerald-800 disabled:opacity-40 text-white px-4 py-2.5 rounded-xl text-sm font-medium">
            <Icon name="send" size={14} /> {t.send}
          </button>
        </div>
        <p className={`text-[10px] mt-2 shrink-0 ${dark ? "text-gray-600" : "text-gray-400"}`}>{t.assistantDisclaimer}</p>
      </Card>
    </div>
  );
}

    apiFetch(`${API}/insights`).then((r) => r.json()).then(setInsights).catch(() => setInsights(null));
  }, [online]);

  if (!stats) return <div className="p-4 md:p-6"><Card dark={dark} className="p-8 text-center"><BackendBanner t={t} online={online} /></Card></div>;

  const pie = {
    labels: [t.positive, t.negative, t.neutral],

      backgroundColor: [COLORS.positive, COLORS.negative, COLORS.neutral] }],
  };
  const catLabels = Object.keys(stats.by_category);
  const bar = {
    labels: catLabels.map((c) => t[categoryLabelKey(c)] || c),
    datasets: [
      { label: t.positive, data: catLabels.map((c) => stats.by_category[c].positive || 0), backgroundColor: COLORS.positive },
      { label: t.negative, data: catLabels.map((c) => stats.by_category[c].negative || 0), backgroundColor: COLORS.negative },

  };

  const days = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(Date.now() - i * 24 * 3600 * 1000);
    const dayComments = recent.filter((c) => new Date(c.created_at).toDateString() === d.toDateString());
    days.push({
      label: d.toLocaleDateString(lang === "ar" ? "ar" : "en", { weekday: "short" }),
      positive: dayComments.filter((c) => c.sentiment === "positive").length,
      negative: dayComments.filter((c) => c.sentiment === "negative").length,
    });
  }
  const trend = {
    labels: days.map((d) => d.label),
    datasets: [
      { label: t.positive, data: days.map((d) => d.positive), borderColor: COLORS.positive, backgroundColor: COLORS.positive + "33", tension: 0.35, fill: true },
      { label: t.negative, data: days.map((d) => d.negative), borderColor: COLORS.negative, backgroundColor: COLORS.negative + "22", tension: 0.35, fill: true },
    ],

  return (
    <div className="p-4 md:p-6 space-y-5">

      <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">

        [t.negative, stats.negative, COLORS.negative], [t.neutral, stats.neutral, COLORS.neutral]].map(([label, val, color]) => (
          <Card dark={dark} className="p-4" key={label}>
            <div className={`text-xs mb-1 ${dark ? "text-gray-400" : "text-gray-500"}`}>{label}</div>
            <div className={`text-2xl font-bold ${dark ? "text-white" : "text-gray-900"}`} style={{ color }}>{val}</div>
          </Card>
        ))}
      </div>
      <div className="grid lg:grid-cols-3 gap-4">
        <Card dark={dark} className="p-4 lg:col-span-1">
          <div className={`font-semibold mb-2 ${dark ? "text-white" : "text-gray-900"}`}>{t.sentimentDistribution}</div>
          <ChartCanvas type="doughnut" data={pie} options={{ maintainAspectRatio: false }} />
        </Card>
        <Card dark={dark} className="p-4 lg:col-span-2">
          <div className={`font-semibold mb-2 ${dark ? "text-white" : "text-gray-900"}`}>{t.sentimentOverTime}</div>
          <ChartCanvas type="line" data={trend} options={{ maintainAspectRatio: false }} />
        </Card>
      </div>
      <div className="grid lg:grid-cols-2 gap-4">
        <Card dark={dark} className="p-4">
          <div className={`font-semibold mb-2 ${dark ? "text-white" : "text-gray-900"}`}>{t.sentimentByCategory}</div>
          <ChartCanvas type="bar" data={bar} options={{ maintainAspectRatio: false, scales: { x: { stacked: false } } }} />
        </Card>
        <Card dark={dark} className="p-4">
          <div className={`font-semibold mb-3 ${dark ? "text-white" : "text-gray-900"}`}>{t.recentComments}</div>
          <div className="space-y-2 max-h-56 overflow-auto pr-1">

              <div key={c.id} className={`flex items-center justify-between gap-3 p-2.5 rounded-xl ${dark ? "bg-slate-800/60" : "bg-gray-50"}`}>
