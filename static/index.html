        <button className="w-full bg-emerald-700 text-white rounded-xl py-2.5 font-medium">{t.save}</button>
      </Card>
    </div>
  );
}

/* ============== SETTINGS ============== */
function SettingsPage({ t, dark, setDark, lang, setLang, online, isGuest, isAdmin, commentsLang, setCommentsLang, assistantLang, setAssistantLang }) {
  const selCls = `px-3 py-1.5 rounded-lg text-xs border cursor-pointer ${dark ? "bg-slate-800 border-slate-700 text-gray-200" : "bg-gray-50 border-gray-200 text-gray-700"}`;
  // v15.7: admin-only Apify source settings (enable/disable + API token),
  // saved server-side via /api/admin/settings/apify — same load-on-mount /
  // save-on-click pattern as the rest of this page.
  const [apify, setApify] = useState(null);
  const [apifyTokenInput, setApifyTokenInput] = useState("");
  const [apifySaving, setApifySaving] = useState(false);
  const [apifyMsg, setApifyMsg] = useState("");
  useEffect(() => {
    if (!isAdmin) return;
    apiFetch(`${API}/admin/settings/apify`).then((r) => r.json()).then(setApify).catch(() => setApify(null));
  }, [isAdmin]);
  const saveApify = (patch) => {
    setApifySaving(true);
    setApifyMsg("");
    const body = Object.assign({}, patch);
    apiFetch(`${API}/admin/settings/apify`, {
      method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body),
    }).then((r) => r.json()).then((data) => {
      setApify((prev) => Object.assign({}, prev, data));
      setApifyTokenInput("");
      setApifyMsg(t.apifySavedMsg);
    }).finally(() => setApifySaving(false));
  };
  return (
    <div className="p-4 md:p-6 max-w-md">
      <BackendBanner t={t} online={online} />
      <Card dark={dark} className="p-5">
        <div className="flex items-center justify-between py-2.5">
          <span className={`text-sm ${dark ? "text-gray-300" : "text-gray-700"}`}>{t.theme}</span>
          <div className="flex gap-2">
            <button onClick={() => setDark(false)} className={`px-3 py-1.5 rounded-lg text-xs ${!dark ? "bg-emerald-700 text-white" : "bg-gray-100 text-gray-600"}`}>{t.light}</button>
            <button onClick={() => setDark(true)} className={`px-3 py-1.5 rounded-lg text-xs ${dark ? "bg-emerald-700 text-white" : "bg-gray-100 text-gray-600"}`}>{t.dark}</button>
          </div>
        </div>
        {/* v15: site UI language — independent of comments language and the AI assistant's language */}
        <div className="flex items-center justify-between py-2.5 border-t mt-1 border-inherit">
          <span className={`text-sm ${dark ? "text-gray-300" : "text-gray-700"}`}>{t.siteLanguage}</span>
          <select value={lang} onChange={(e) => setLang(e.target.value)} className={selCls}>
            {UI_LANGS.map((code) => <option key={code} value={code}>{LANG_NAMES[code]}</option>)}
          </select>
        </div>
        {/* Comments Language (v11, extended in v15 to all 6 languages) — for
            EVERY signed-in account (admin AND regular users; guests have no
            account to save the choice on). Personal per account: saved on
            the user's own row in the database, so it never affects other
            users and is restored on every login. */}
        {!isGuest && (
          <div className={`py-2.5 border-t mt-1 ${dark ? "border-slate-800" : "border-gray-100"}`}>
            <div className="flex items-center justify-between">
              <span className={`text-sm ${dark ? "text-gray-300" : "text-gray-700"}`}>{t.commentsLanguage}</span>
              <select value={commentsLang} onChange={(e) => setCommentsLang(e.target.value)} className={selCls}>
                <option value="original">{t.originalLang}</option>
                {UI_LANGS.map((code) => <option key={code} value={code}>{LANG_NAMES[code]}</option>)}
              </select>
            </div>
            <p className={`text-xs mt-2 ${dark ? "text-gray-500" : "text-gray-400"}`}>{t.commentsLanguageSub}</p>
          </div>
        )}
        {/* v15: independent AI assistant answer language — "auto" follows the site UI language above */}
        {!isGuest && (
          <div className={`py-2.5 border-t mt-1 ${dark ? "border-slate-800" : "border-gray-100"}`}>
            <div className="flex items-center justify-between">
              <span className={`text-sm ${dark ? "text-gray-300" : "text-gray-700"}`}>{t.assistantLanguage}</span>
              <select value={assistantLang} onChange={(e) => setAssistantLang(e.target.value)} className={selCls}>
                <option value="auto">{t.autoLang}</option>
                {UI_LANGS.map((code) => <option key={code} value={code}>{LANG_NAMES[code]}</option>)}
              </select>
            </div>
          </div>
        )}
      </Card>
      {isAdmin && (
        <Card dark={dark} className="p-5 mt-4">
          <div className={`font-semibold mb-1 ${dark ? "text-white" : "text-gray-900"}`}>{t.apifySettingsTitle}</div>
          <p className={`text-xs mb-3 ${dark ? "text-gray-500" : "text-gray-400"}`}>{t.apifySettingsSub}</p>
          {apify ? (
            <>
              <div className="flex items-center justify-between py-2.5 border-t border-inherit">
                <span className={`text-sm ${dark ? "text-gray-300" : "text-gray-700"}`}>{t.apifyEnabled}</span>
                <button onClick={() => saveApify({ enabled: !apify.enabled })} disabled={apifySaving}
                  className={`px-3 py-1.5 rounded-lg text-xs disabled:opacity-40 ${apify.enabled ? "bg-emerald-700 text-white" : "bg-gray-100 text-gray-600"}`}>
                  {apify.enabled ? t.enabledOn : t.enabledOff}
                </button>
              </div>
              <div className="py-2.5 border-t border-inherit">
                <div className="flex items-center justify-between mb-2">
                  <span className={`text-sm ${dark ? "text-gray-300" : "text-gray-700"}`}>{t.apifyTokenLabel}</span>
                  <span className={`text-[11px] ${apify.has_token ? "text-emerald-600" : dark ? "text-gray-500" : "text-gray-400"}`}>
                    {apify.has_token ? `${t.apifyTokenSaved} (${apify.token_preview})` : t.apifyTokenNotSet}
                  </span>
                </div>
                <div className="flex gap-2">
                  <input type="password" value={apifyTokenInput} onChange={(e) => setApifyTokenInput(e.target.value)}
                    placeholder={t.apifyTokenPlaceholder}
                    className={`flex-1 px-3 py-1.5 rounded-lg text-xs border ${dark ? "bg-slate-800 border-slate-700 text-gray-200" : "bg-gray-50 border-gray-200 text-gray-700"}`} />
                  <button onClick={() => apifyTokenInput.trim() && saveApify({ api_token: apifyTokenInput.trim() })}
                    disabled={apifySaving || !apifyTokenInput.trim()}
                    className="px-3 py-1.5 rounded-lg text-xs bg-emerald-700 hover:bg-emerald-800 disabled:opacity-40 text-white">
                    {t.apifySaveBtn}
                  </button>
                </div>
                {apifyMsg && <p className="text-[11px] mt-1.5 text-emerald-600">{apifyMsg}</p>}
              </div>
            </>
          ) : (
            <p className={`text-xs ${dark ? "text-gray-500" : "text-gray-400"}`}>—</p>
          )}
        </Card>
      )}
    </div>
  );
}
/* ============== ERROR BOUNDARY (shows real errors instead of a blank page) ============== */
/* ============== v15.5: YOUTUBE COMMENT ANALYSIS (admin) ============== */
function YouTubeAnalysisPage({ t, dark, online }) {
  const [url, setUrl] = useState("");
  const [maxComments, setMaxComments] = useState(150);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [result, setResult] = useState(null);

  const lang = (typeof document !== "undefined" && document.documentElement.lang) || "ar";

  const analyze = async (e) => {
    if (e) e.preventDefault();
    setError(""); setResult(null); setLoading(true);
    try {
      const r = await apiFetch(`${API}/youtube/analyze`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url, max_comments: Number(maxComments) || 150 }),
      });
      const data = await r.json();
      if (!r.ok) { setError((lang === "ar" && data.error_ar) || data.error || "Error"); setLoading(false); return; }
      setResult(data);
    } catch { setError(t.backendOffline); }
    setLoading(false);
  };

  const pie = result && {
    labels: [t.positive, t.negative, t.neutral],
    datasets: [{ data: [result.counts.positive, result.counts.negative, result.counts.neutral],
      backgroundColor: [COLORS.positive, COLORS.negative, COLORS.neutral] }],
  };

  return (
    <div className="p-4 md:p-6 space-y-5">
      <BackendBanner t={t} online={online} />
      <Card dark={dark} className="p-5">
        <div className="flex items-center gap-2 mb-1">
          <span className="px-2 py-0.5 rounded-full text-[10px] font-medium bg-red-100 text-red-700">YouTube</span>
          <div className={`font-bold text-lg ${dark ? "text-white" : "text-gray-900"}`}>{t.youtubeAnalysis}</div>
        </div>
        <p className={`text-sm mb-4 ${dark ? "text-gray-400" : "text-gray-500"}`}>{t.youtubeSub}</p>
        <form onSubmit={analyze} className="flex flex-col sm:flex-row gap-2">
          <input required type="url" value={url} onChange={(e) => setUrl(e.target.value)} placeholder={t.youtubeUrlPlaceholder}
            className={`${PILL} flex-1 ${dark ? "bg-slate-800 border-slate-700 text-white" : "border-gray-200"}`} />
          <div className="flex items-center gap-2">
            <span className={`text-xs ${dark ? "text-gray-400" : "text-gray-500"}`}>{t.maxCommentsLabel}</span>
            <input type="number" min={1} max={200} value={maxComments} onChange={(e) => setMaxComments(e.target.value)}
              className={`${PILL} w-20 ${dark ? "bg-slate-800 border-slate-700 text-white" : "border-gray-200"}`} />
          </div>
          <button disabled={loading} className="bg-red-600 hover:bg-red-700 text-white rounded-xl px-5 py-2.5 font-medium whitespace-nowrap">
            {loading ? "..." : t.analyzeVideo}
          </button>
        </form>
        {error && <p className="text-rose-600 text-xs mt-3">{error}</p>}
        {loading && <p className={`text-xs mt-3 ${dark ? "text-gray-400" : "text-gray-500"}`}>{t.analyzingComments}</p>}
      </Card>

      {result && (
        <React.Fragment>
          <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
            {[[t.commentsAnalyzed, result.analyzed, "#0369a1"],
              [t.positive, result.counts.positive, COLORS.positive],
              [t.negative, result.counts.negative, COLORS.negative],
              [t.neutral, result.counts.neutral, COLORS.neutral]].map(([label, val, color]) => (
              <Card dark={dark} className="p-4" key={label}>
                <div className={`text-xs mb-1 ${dark ? "text-gray-400" : "text-gray-500"}`}>{label}</div>
                <div className="text-2xl font-bold" style={{ color }}>{val}</div>
              </Card>
            ))}
          </div>
          <div className="grid lg:grid-cols-3 gap-4">
            <Card dark={dark} className="p-4 lg:col-span-1">
              <div className={`font-semibold mb-2 ${dark ? "text-white" : "text-gray-900"}`}>{t.sentimentDistribution}</div>
              <ChartCanvas type="doughnut" data={pie} options={{ maintainAspectRatio: false }} />
              {result.stored && (
                <p className={`text-[11px] mt-3 text-center ${dark ? "text-gray-500" : "text-gray-400"}`}>
                  +{result.stored.added} {t.storedNewComments}
                </p>
              )}
            </Card>
            <Card dark={dark} className="p-4 lg:col-span-2">
              <div className={`font-semibold mb-3 ${dark ? "text-white" : "text-gray-900"}`}>{t.videoCommentsList}</div>
              <div className="space-y-2 max-h-[420px] overflow-auto pr-1">
                {result.comments.map((c, i) => (
                  <div key={i} className={`flex items-start justify-between gap-3 p-3 rounded-xl ${dark ? "bg-slate-800/60" : "bg-gray-50"}`}>
                    <div className="min-w-0 flex-1">
                      <div className={`text-[11px] mb-0.5 ${dark ? "text-gray-500" : "text-gray-400"}`}>{c.author}</div>
                      <div className={`text-xs ${dark ? "text-gray-200" : "text-gray-700"}`}>{c.text}</div>
                    </div>
                    <Badge s={c.sentiment} t={t} />
                  </div>
                ))}
              </div>
            </Card>
          </div>
        </React.Fragment>
      )}
    </div>
  );
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(error) { return { error }; }
  componentDidCatch(error, info) { console.error("Page crashed:", error, info); }
  render() {
    if (this.state.error) {
      return (
        <div className="p-6" style={{ maxWidth: "100%", overflowX: "hidden" }}>
          <div className="rounded-2xl border border-rose-200 bg-rose-50 p-5 text-rose-700">
            <div className="font-bold mb-1">This page hit an error</div>
            <pre className="text-xs whitespace-pre-wrap" style={{ overflowWrap: "break-word", wordBreak: "break-word", maxWidth: "100%" }}>{String(this.state.error && this.state.error.message || this.state.error)}</pre>
            <button onClick={() => this.setState({ error: null })} className="mt-3 text-xs bg-rose-600 text-white px-3 py-1.5 rounded-lg">
              Try again
            </button>
          </div>
        </div>
      );
    }
    return this.props.children;
  }
}

/* ============== ACCESS DENIED (admin panel protection) ============== */
function AccessDenied({ t, dark }) {
  return (
    <div className="p-6 max-w-md mx-auto">
      <div className={`rounded-2xl border p-8 text-center ${dark ? "bg-slate-900 border-slate-800" : "bg-white border-gray-100"}`}>
        <div className={`w-14 h-14 rounded-full mx-auto mb-4 flex items-center justify-center ${dark ? "bg-rose-900/30" : "bg-rose-50"}`}>
          <Icon name="x" size={22} className="text-rose-500" />
        </div>
        <div className={`font-bold mb-1 ${dark ? "text-white" : "text-gray-900"}`}>{t.adminOnly}</div>
        <p className={`text-sm ${dark ? "text-gray-400" : "text-gray-500"}`}>{t.adminOnlySub}</p>
      </div>
    </div>
  );
}

/* ============== APP ROOT ============== */
function App() {
  // Restore a remembered login (saved on the last successful sign-in).
  const [user, setUser] = useState(() => {
    const s = loadSession();
    if (s) { window.__authToken = s.token; return s.user; }
    return null;
  });
  // v15: site UI language — a PERSONAL setting for signed-in accounts
  // (saved via PUT /api/me/language-prefs, same pattern as commentsLang
  // below), with a localStorage fallback so guests/logged-out visitors and
  // offline moments still keep their last choice on this browser.
  const [lang, setLangState] = useState(() => {
    const s = loadSession();
    if (s && s.user && s.user.site_lang && UI_LANGS.includes(s.user.site_lang)) return s.user.site_lang;
    try { const v = localStorage.getItem(SITE_LANG_KEY); return UI_LANGS.includes(v) ? v : "ar"; } catch (e) { return "ar"; }
  });
  const [dark, setDark] = useState(false);
  // Display language for COMMENTS (v11, extended in v15 to all 6 languages) —
  // a PERSONAL setting of each signed-in account (admin and regular users
  // alike). The chosen value is saved on the account's own row in the
  // database via PUT /api/me/comment-lang, so it survives logout/login,
  // restarts and redeploys, follows the account on any device, and one
  // user's choice never affects anyone else. localStorage only mirrors it
  // as an offline fallback for the same browser.
  const [commentsLang, setCommentsLangState] = useState(() => {
    const s = loadSession();
    if (s && s.user && s.user.comment_lang) return s.user.comment_lang;
    // v13: default is ARABIC so translations of foreign comments appear
    // directly; each account's own saved choice (v11) still overrides this.
    try { return localStorage.getItem(COMMENTS_LANG_KEY) || "ar"; } catch (e) { return "ar"; }
  });
  // v15: independent AI assistant answer language ("auto" = follow `lang` above).
  const [assistantLang, setAssistantLangState] = useState(() => {
    const s = loadSession();
    if (s && s.user && s.user.assistant_lang) return s.user.assistant_lang;
    try { return localStorage.getItem(ASSISTANT_LANG_KEY) || "auto"; } catch (e) { return "auto"; }
  });

  const persistLanguagePrefs = (patch) => {
    if (user && !user.guest && user.role !== "guest" && window.__authToken) {
      apiFetch(`${API}/me/language-prefs`, {
        method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify(patch),
      }).then((r) => (r.ok ? r.json() : null)).then((u) => {
        if (u) { const nu = Object.assign({}, user, u); setUser(nu); saveSession(nu, window.__authToken, currentRemember()); }
      }).catch(() => {}); // offline: the local value still applies; synced next time it's changed
    }
  };
  const setLang = (v) => {
    if (!UI_LANGS.includes(v)) return;
    setLangState(v);
    try { localStorage.setItem(SITE_LANG_KEY, v); } catch (e) {}
    persistLanguagePrefs({ site_lang: v });
  };
  const setAssistantLang = (v) => {
    setAssistantLangState(v);
    try { localStorage.setItem(ASSISTANT_LANG_KEY, v); } catch (e) {}
    persistLanguagePrefs({ assistant_lang: v });
  };
  const setCommentsLang = (v) => {
    setCommentsLangState(v);
    try { localStorage.setItem(COMMENTS_LANG_KEY, v); } catch (e) {}
    // Persist on the account itself (guests have no account -> nothing to save).
    if (user && !user.guest && user.role !== "guest" && window.__authToken) {
      apiFetch(`${API}/me/comment-lang`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ comment_lang: v }),
      })
        .then((r) => (r.ok ? r.json() : null))
        .then((u) => {
          if (u && u.comment_lang) {
            const nu = Object.assign({}, user, { comment_lang: u.comment_lang });
            setUser(nu);
            saveSession(nu, window.__authToken, currentRemember()); // keep the existing remember-me choice
          }
        })
        .catch(() => {}); // offline: the local value still applies; synced next time it's changed
    }
  };
  const [page, setPage] = useState("dashboard");
  const [open, setOpen] = useState(false);
  const [online, setOnline] = useState(false);
  const [refreshKey, setRefreshKey] = useState(0);
  const t = T[lang] || T.ar;
  const isRTL = RTL_LANGS.includes(lang);

  useEffect(() => {
    document.documentElement.dir = isRTL ? "rtl" : "ltr";
    document.body.style.fontFamily = lang === "ar" ? "'Tajawal',sans-serif" : "'Inter',sans-serif";
  }, [lang]);
  useEffect(() => {
    const check = () => apiFetch(`${API}/health`).then((r) => r.ok && setOnline(true)).catch(() => setOnline(false));
    check();
    const iv = setInterval(check, 20000);
    return () => clearInterval(iv);
  }, []);

  if (!user) return <Login t={t} lang={lang} setLang={setLangState} dark={dark} setDark={setDark}
    onLogin={(u) => {
      setUser(u); setPage("dashboard");
      // v11/v15: restore this account's saved language preferences (guests -> defaults)
      setCommentsLangState((u && u.comment_lang) || "ar");
      if (u && u.site_lang && UI_LANGS.includes(u.site_lang)) setLangState(u.site_lang);
      setAssistantLangState((u && u.assistant_lang) || "auto");
    }} />;

  const isAdmin = user.role === "admin";
  const isGuest = !!user.guest || user.role === "guest";
  const canWrite = !isGuest; // registered users and the admin can add comments
  const pages = {
    dashboard: <Dashboard t={t} dark={dark} online={online} lang={lang} commentsLang={commentsLang} key={refreshKey} />,
    assistant: <AssistantPage t={t} dark={dark} lang={lang} assistantLang={assistantLang} />,
    analyzeComment: <AnalyzeComment t={t} dark={dark} online={online} canWrite={canWrite} onAnalyzed={() => setRefreshKey((k) => k + 1)} />,
    comments: <CommentsPage t={t} dark={dark} online={online} refreshKey={refreshKey} isAdmin={isAdmin} canWrite={canWrite} commentsLang={commentsLang} />,
    // Analytics + Login Logs + Users are admin-only: any non-admin who reaches
    // them (e.g. programmatically) gets the Access Denied screen instead.
    analytics: isAdmin ? <AnalyticsPage t={t} dark={dark} online={online} /> : <AccessDenied t={t} dark={dark} />,
    youtube: isAdmin ? <YouTubeAnalysisPage t={t} dark={dark} online={online} /> : <AccessDenied t={t} dark={dark} />,
    reports: <ReportsPage t={t} dark={dark} online={online} isAdmin={isAdmin} />,
    loginLogs: isAdmin ? <LoginLogsPage t={t} dark={dark} online={online} /> : <AccessDenied t={t} dark={dark} />,
    users: isAdmin ? <UsersPage t={t} dark={dark} online={online} /> : <AccessDenied t={t} dark={dark} />,
    profile: <ProfilePage t={t} dark={dark} user={user} />,
    settings: <SettingsPage t={t} dark={dark} setDark={setDark} lang={lang} setLang={setLang} online={online}
      isGuest={isGuest} isAdmin={isAdmin} commentsLang={commentsLang} setCommentsLang={setCommentsLang}
      assistantLang={assistantLang} setAssistantLang={setAssistantLang} />,
  };

  return (
    <div className={`min-h-screen flex ${dark ? "bg-slate-950" : "bg-gray-50"}`}>
      <Sidebar t={t} page={page} setPage={setPage} dark={dark} lang={lang} open={open} setOpen={setOpen} isAdmin={isAdmin}
        onLogout={() => {
          window.__authToken = null; clearSession(); setUser(null); setPage("dashboard");
          setCommentsLangState("ar"); setAssistantLangState("auto");
        }} />
      {open && <div className="fixed inset-0 bg-black/40 z-30 md:hidden" onClick={() => setOpen(false)} />}
      <div className="flex-1 min-w-0">
        <Topbar t={t} lang={lang} setLang={setLang} dark={dark} setDark={setDark} title={t[page]} setOpen={setOpen} user={user} />
        {isGuest && (
          <div className={`mx-4 md:mx-6 mt-4 px-4 py-2.5 rounded-xl text-xs flex items-center gap-2 ${dark ? "bg-amber-900/25 text-amber-300 border border-amber-800/40" : "bg-amber-50 text-amber-700 border border-amber-200"}`}>
            <Icon name="eye" size={13} /> {t.guestBanner}
          </div>
        )}
        <ErrorBoundary key={page}>{pages[page]}</ErrorBoundary>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
window.__appMounted = true;
</script>
